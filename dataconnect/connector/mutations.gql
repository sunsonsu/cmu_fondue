mutation CreateProblem(
  $title: String!, 
  $detail: String!,
  $locationName: String!,
  $lat: Float!, 
  $lng: Float!,
  $reporterId: String!,
  $typeId: UUID!,
  $tagId: UUID!
) @auth(level: PUBLIC insecureReason: "change to USER when production" ) {
  problem_insert(data: {
    title: $title,
    detail: $detail,
    locationName: $locationName,
    problemLat: $lat,
    problemLng: $lng,
    reporterId: $reporterId,
    problemTypeId: $typeId,
    currentTagId: $tagId
  })
}

mutation UpdateProblem(
  $id: UUID!,
  $title: String!, 
  $detail: String!, 
  $locationName: String!,
  $lat: Float!, 
  $lng: Float!,
  $typeId: UUID!,
  $tagId: UUID!
) @auth(level: PUBLIC insecureReason: "change to USER when production" ) {
  problem_update(
    key: { problemId: $id }, 
    data: {
      title: $title,
      detail: $detail,
      locationName: $locationName,
      problemLat: $lat,
      problemLng: $lng,
      problemTypeId: $typeId,
      currentTagId: $tagId
    }
  )
}

mutation DeleteProblem($id: UUID!) @auth(level: PUBLIC insecureReason: "change to USER when production" ) {
  problem_delete(key: { problemId: $id })
}

# G
mutation insertProblemType($name: String!, $description: String!) @auth(level: PUBLIC) {
  problemType_insert(
    data: {typeName: $name, typeThaiName: $description}
  )
}

# Apivit Suppaluk
mutation insertUser($email: String!, $isAdmin: Boolean!) @auth(level: USER) {
  user_insert(
    data: {email: $email, isAdmin: $isAdmin}
  )
}